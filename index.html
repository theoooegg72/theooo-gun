<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>theooo的改枪码</title>
    <style>
        /* 全局CSS变量：方便切换暗黑模式 */
        :root {
            /* 浅色模式 - 冷色系多彩渐变背景 */
            --bg-primary: linear-gradient(120deg, #e0f7fa, #e1f5fe, #f3e5f5, #e8eaf6, #f0f8fb);
            --card-bg: rgba(255, 255, 255, 0.2); /* 卡片透明化 */
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --card-border: rgba(226, 232, 240, 0.6); /* 边框半透明 */
            --hover-border: #4299e1;
            --hover-shadow: 0 4px 15px rgba(66, 153, 225, 0.15);
            --scrollbar-thumb: linear-gradient(180deg, #4299e1, #9f7aea, #26a69a);
            --scrollbar-track: rgba(245, 247, 250, 0.3);
            --title-gradient: linear-gradient(90deg, #0288d1, #7e57c2, #26a69a, #039be5);
            --decor-line: linear-gradient(90deg, #0288d1, #7e57c2, #26a69a);
            --back-to-top: #0288d1;
            --back-to-top-hover: #0277bd;
            --random-fill-gradient: linear-gradient(90deg, #0288d1, #7e57c2, #26a69a);
            --fill-bg: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            /* 暗黑模式 - 冷色系多彩渐变背景 */
            --bg-primary: linear-gradient(120deg, #0f172a, #1e293b, #1a103d, #1e1b4b, #0f172a);
            --card-bg: rgba(45, 55, 72, 0.2); /* 卡片透明化 */
            --text-primary: #f7fafc;
            --text-secondary: #a0aec0;
            --card-border: rgba(74, 85, 104, 0.6); /* 边框半透明 */
            --hover-border: #9f7aea;
            --hover-shadow: 0 4px 15px rgba(159, 122, 234, 0.25);
            --scrollbar-thumb: linear-gradient(180deg, #9f7aea, #4299e1, #26a69a);
            --scrollbar-track: rgba(26, 32, 44, 0.3);
            --title-gradient: linear-gradient(90deg, #9f7aea, #4299e1, #26a69a, #039be5);
            --decor-line: linear-gradient(90deg, #9f7aea, #4299e1, #26a69a);
            --back-to-top: #9f7aea;
            --back-to-top-hover: #805ad5;
            --random-fill-gradient: linear-gradient(90deg, #9f7aea, #4299e1, #26a69a);
            --fill-bg: rgba(45, 55, 72, 0.4);
        }

        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            transition: all 0.5s ease; /* 统一过渡动画，适配暗黑模式切换 */
        }

        /* 粒子画布样式 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 不阻挡鼠标交互 */
            z-index: 0; /* 放在最底层 */
        }

        /* 动态渐变背景（支持鼠标跟随） */
        body {
            background: var(--bg-primary);
            background-size: 400% 400%; /* 扩大背景尺寸，让渐变流动更明显 */
            animation: bgFlow 20s ease infinite alternate;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 10px;
            overflow-x: hidden;
            position: relative; /* 为粒子画布定位做准备 */
        }

        /* 背景流动动画 - 加快速度，增强多彩效果 */
        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            25% { background-position: 25% 75%; }
            50% { background-position: 50% 25%; }
            75% { background-position: 75% 75%; }
            100% { background-position: 100% 50%; }
        }

        /* 功能按钮容器 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
            position: relative;
            z-index: 1; /* 按钮在粒子上层 */
        }

        /* 搜索容器样式 */
        .search-container {
            position: relative;
            flex: 1;
            max-width: 300px;
        }

        /* 搜索输入框 - 增加透明感 */
        .search-input {
            width: 100%;
            padding: 8px 15px;
            padding-right: 35px;
            border: 1px solid var(--card-border);
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.15); /* 输入框透明 */
            backdrop-filter: blur(8px); /* 毛玻璃效果 */
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .search-input:focus {
            border-color: var(--hover-border);
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.1);
        }

        /* 清除搜索按钮 */
        .clear-search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .clear-search-btn.show {
            display: flex;
        }

        .clear-search-btn:hover {
            color: var(--text-primary);
            transform: translateY(-50%) scale(1.1);
        }

        /* 幸运改枪码按钮 - 冷色系渐变 */
        .lucky-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #0288d1, #7e57c2, #26a69a);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(66, 153, 225, 0.2);
            position: relative;
            z-index: 1;
        }

        .lucky-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 153, 225, 0.3);
        }

        .lucky-btn:active {
            transform: translateY(0);
        }

        /* 暗黑模式切换按钮 */
        .theme-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.15); /* 按钮透明 */
            backdrop-filter: blur(8px); /* 毛玻璃效果 */
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        .theme-btn:hover {
            transform: scale(1.1);
        }

        /* 主卡片 - 透明化+毛玻璃 */
        .content-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(15px); /* 毛玻璃效果，增强透明质感 */
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            padding: 40px 20px;
            text-align: center;
            max-width: 650px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            margin-top: 20px;
            animation: cardFadeIn 1s ease forwards;
            opacity: 0;
            transform: translateY(20px);
            position: relative;
            z-index: 1; /* 卡片在粒子上层 */
        }

        @keyframes cardFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 渐变文字标题 - 冷色系增强 */
        .title {
            font-size: 32px;
            font-weight: 700;
            background: var(--title-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }

        /* 条目容器 */
        .text-group {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        /* 卡片化条目样式 - 透明化 */
        .main-text {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.5;
            cursor: pointer;
            padding: 12px 15px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.08); /* 条目透明 */
            backdrop-filter: blur(8px); /* 毛玻璃效果 */
            border: 1px solid var(--card-border);
            text-align: left;
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            z-index: 1;
            --random-fill-gradient: linear-gradient(90deg, #0288d1, #7e57c2, #26a69a);
        }
        
        /* 动态渐变填充层（伪元素） */
        .main-text::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--random-fill-gradient);
            opacity: 0.2;
            z-index: -1;
            border-radius: 10px;
            transition: none;
        }

        .main-text:hover {
            transform: translateY(-2px);
            box-shadow: var(--hover-shadow);
            border-color: var(--hover-border);
            background-color: rgba(255, 255, 255, 0.12);
        }

        /* 幸运条目闪烁动画 */
        .main-text.lucky {
            animation: luckyFlash 1s ease-in-out;
            border-color: #81d4fa; /* 冷色系高亮 */
            box-shadow: 0 0 15px rgba(129, 212, 250, 0.4);
        }

        @keyframes luckyFlash {
            0%, 100% { transform: scale(1); border-color: #81d4fa; }
            50% { transform: scale(1.05); border-color: #4fc3f7; }
        }

        /* 随机渐变填充动画 */
        .main-text.fill::before {
            animation: gradientFillPseudo 1s ease-in-out forwards;
        }
        @keyframes gradientFillPseudo {
            0% { width: 0; opacity: 0.2; }
            50% { width: 100%; opacity: 0.3; }
            100% { width: 100%; opacity: 0.1; }
        }

        /* 点击复制成功的打勾动效 */
        .check-icon {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%) scale(0);
            font-size: 20px;
            color: #48bb78;
            z-index: 10;
            animation: checkPop 0.5s ease forwards;
        }

        @keyframes checkPop {
            0% { transform: translateY(-50%) scale(0); }
            50% { transform: translateY(-50%) scale(1.2); }
            100% { transform: translateY(-50%) scale(1); }
        }

        .sub-text {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .decor-line {
            width: 100px;
            height: 4px;
            background: var(--decor-line);
            margin: 0 auto 20px;
            border-radius: 4px;
            position: relative;
            z-index: 1;
        }

        /* 响应式适配 */
        @media (max-width: 576px) {
            .content-card {
                padding: 30px 15px;
                max-height: 75vh;
                backdrop-filter: blur(10px); /* 移动端降低毛玻璃强度 */
            }
            .title {
                font-size: 26px;
            }
            .main-text {
                font-size: 16px;
                padding: 10px 12px;
            }
            .lucky-btn {
                font-size: 14px;
                padding: 6px 16px;
            }
            .theme-btn {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .back-to-top {
                width: 40px;
                height: 40px;
                font-size: 18px;
                bottom: 20px;
                right: 20px;
            }
            .search-container {
                max-width: 100%;
                width: 100%;
                margin-bottom: 10px;
            }
            .btn-group {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* 复制成功弹窗样式 */
        .copy-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background-color: rgba(72, 187, 120, 0.9);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.3s ease;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* 滚动条美化 */
        .content-card::-webkit-scrollbar {
            width: 8px;
        }
        .content-card::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }
        .content-card::-webkit-scrollbar-track {
            background-color: var(--scrollbar-track);
            border-radius: 4px;
        }

        /* 回到顶部按钮 - 透明化 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--back-to-top);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(66, 153, 225, 0.3);
            z-index: 999;
        }

        .back-to-top.show {
            opacity: 1;
            pointer-events: all;
        }

        .back-to-top:hover {
            background-color: var(--back-to-top-hover);
            transform: scale(1.1);
        }
    </style>
</head>

    <script>
        // ====================== 无代码配置区 ======================
        const config = {

        // ====================== 配置区结束 =======================

        // ========== 新增：鼠标跟随粒子效果 ==========
        class ParticleEffect {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.canvasWidth = window.innerWidth;
                this.canvasHeight = window.innerHeight;
                this.mouse = { x: null, y: null, radius: 150 };

                // 设置画布尺寸
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());

                // 监听鼠标移动
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.x;
                    this.mouse.y = e.y;
                });

                // 冷色系粒子颜色库
                this.colors = [
                    '#0288d1', '#2196f3', '#42a5f5', '#64b5f6', // 蓝色系
                    '#26a69a', '#26c6da', '#4dd0e1', '#80deea', // 青色系
                    '#7e57c2', '#9575cc', '#b39ddb', '#d1c4e9', // 紫色系
                    '#00acc1', '#00bcd4', '#00c853', '#69f0ae'  // 蓝绿系
                ];

                // 初始化粒子
                this.initParticles();

                // 动画循环
                this.animate();
            }

            // 调整画布尺寸
            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.canvasWidth = window.innerWidth;
                this.canvasHeight = window.innerHeight;
            }

            // 初始化粒子
            initParticles() {
                this.particles = [];
                const particleCount = Math.floor((this.canvasWidth * this.canvasHeight) / 15000); // 自适应粒子数量
                
                for (let i = 0; i < particleCount; i++) {
                    const size = Math.random() * 3 + 1;
                    this.particles.push({
                        x: Math.random() * this.canvasWidth,
                        y: Math.random() * this.canvasHeight,
                        size: size,
                        speedX: Math.random() * 0.5 - 0.25, // 慢速移动
                        speedY: Math.random() * 0.5 - 0.25,
                        color: this.colors[Math.floor(Math.random() * this.colors.length)],
                        opacity: Math.random() * 0.5 + 0.3 // 半透明
                    });
                }
            }

            // 绘制粒子
            drawParticle(particle) {
                this.ctx.beginPath();
                this.ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                this.ctx.fillStyle = particle.color;
                this.ctx.globalAlpha = particle.opacity;
                this.ctx.fill();
                this.ctx.globalAlpha = 1;
            }

            // 更新粒子位置（跟随鼠标）
            updateParticles() {
                for (let i = 0; i < this.particles.length; i++) {
                    const p = this.particles[i];

                    // 鼠标吸引力
                    if (this.mouse.x && this.mouse.y) {
                        const dx = this.mouse.x - p.x;
                        const dy = this.mouse.y - p.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const maxDistance = this.mouse.radius;
                        const force = (maxDistance - distance) / maxDistance;

                        if (distance < maxDistance) {
                            p.x += forceDirectionX * force * 0.8;
                            p.y += forceDirectionY * force * 0.8;
                        }
                    }

                    // 粒子移动
                    p.x += p.speedX;
                    p.y += p.speedY;

                    // 边界检测（超出屏幕重置）
                    if (p.x < 0 || p.x > this.canvasWidth) p.speedX = -p.speedX;
                    if (p.y < 0 || p.y > this.canvasHeight) p.speedY = -p.speedY;

                    // 绘制粒子
                    this.drawParticle(p);
                }
            }

            // 动画循环
            animate() {
                this.ctx.clearRect(0, 0, this.canvasWidth, this.canvasHeight);
                this.updateParticles();
                requestAnimationFrame(() => this.animate());
            }
        }

        // 初始化粒子效果
        window.addEventListener('load', () => {
            new ParticleEffect();
        });

        // ========== 原有逻辑保留（仅调整部分样式关联） ==========
        // 获取核心元素
        const copyToast = document.getElementById('copyToast');
        const backToTop = document.getElementById('backToTop');
        const luckyBtn = document.getElementById('luckyBtn');
        const themeBtn = document.getElementById('themeBtn');
        const pageTitle = document.getElementById('pageTitle');
        const pageSubTitle = document.getElementById('pageSubTitle');
        const textGroup = document.getElementById('textGroup');
        const body = document.body;
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');

        // 初始化页面文本
        pageTitle.textContent = config.pageTitle;
        pageSubTitle.textContent = config.pageSubTitle;
        luckyBtn.textContent = config.luckyBtnText;
        searchInput.placeholder = config.searchPlaceholder || "搜索枪械名称/改枪码...";

        // 动态渲染改枪码列表
        function renderGunCodes(filteredCodes = null) {
            textGroup.innerHTML = '';
            const codesToRender = filteredCodes || config.gunCodes;
            
            if (codesToRender.length > 0) {
                codesToRender.forEach(code => {
                    const item = document.createElement('div');
                    item.className = 'main-text';
                    item.textContent = code;
                    item.addEventListener('click', () => {
                        copyTextToClipboard(code, item);
                    });
                    textGroup.appendChild(item);
                });
            } else {
                const emptyTip = document.createElement('div');
                emptyTip.className = 'main-text';
                emptyTip.style.textAlign = 'center';
                emptyTip.style.color = 'var(--text-secondary)';
                emptyTip.style.cursor = 'default';
                emptyTip.textContent = config.searchEmptyText || '未找到匹配的改枪码 😞';
                emptyTip.addEventListener('click', (e) => e.preventDefault());
                emptyTip.style.pointerEvents = 'none';
                textGroup.appendChild(emptyTip);
            }
        }

        // 初始化渲染
        renderGunCodes();

        // 搜索功能逻辑
        function handleSearch() {
            const keyword = searchInput.value.trim().toLowerCase();
            if (keyword) {
                clearSearchBtn.classList.add('show');
                const filtered = config.gunCodes.filter(code => 
                    code.toLowerCase().includes(keyword)
                );
                renderGunCodes(filtered);
            } else {
                clearSearchBtn.classList.remove('show');
                renderGunCodes();
            }
        }

        searchInput.addEventListener('input', handleSearch);
        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.classList.remove('show');
            renderGunCodes();
            searchInput.focus();
        });
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleSearch();
                searchInput.blur();
            }
        });

        // 生成随机渐变颜色（冷色系）
        function generateRandomGradient() {
            const getRandomColor = () => {
                // 冷色系RGB范围
                const r = Math.floor(Math.random() * 80) + 40; // 低红
                const g = Math.floor(Math.random() * 120) + 80; // 中高绿
                const b = Math.floor(Math.random() * 150) + 100; // 高蓝
                return `rgb(${r}, ${g}, ${b})`;
            };
            const angle = Math.floor(Math.random() * 360);
            return `linear-gradient(${angle}deg, ${getRandomColor()}, ${getRandomColor()}, ${getRandomColor()})`;
        }

        // 鼠标跟随背景（保留）
        body.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth * 10;
            const y = e.clientY / window.innerHeight * 10;
            body.style.backgroundPosition = `${x}% ${y}%`;
        });

        // 复制功能
        const copyTextToClipboard = async (text, el, isLucky = false) => {
            try {
                await navigator.clipboard.writeText(text.trim());
                
                const randomGradient = generateRandomGradient();
                el.style.setProperty('--random-fill-gradient', randomGradient);
                
                el.classList.add('fill');
                setTimeout(() => el.classList.remove('fill'), 1000);

                let toastText = config.copySuccessText;
                if (isLucky) {
                    const gunName = text.split('-')[0];
                    toastText = config.luckyCopySuccessTemplate.replace('{gunName}', gunName);
                }
                
                copyToast.textContent = toastText;
                copyToast.style.backgroundColor = 'rgba(72, 187, 120, 0.9)';
                copyToast.classList.add('show');
                setTimeout(() => copyToast.classList.remove('show'), 2000);

                const checkIcon = document.createElement('span');
                checkIcon.className = 'check-icon';
                checkIcon.innerHTML = '✓';
                el.appendChild(checkIcon);
                setTimeout(() => el.removeChild(checkIcon), 1500);

            } catch (err) {
                copyToast.textContent = config.copyFailText;
                copyToast.style.backgroundColor = 'rgba(229, 62, 62, 0.9)';
                copyToast.classList.add('show');
                setTimeout(() => copyToast.classList.remove('show'), 2000);
            }
        };

        // 随机幸运改枪码
        luckyBtn.addEventListener('click', () => {
            const textItems = document.querySelectorAll('.main-text');
            if (textItems.length === 0 || textItems[0].textContent === config.searchEmptyText) return;
            
            const randomIndex = Math.floor(Math.random() * textItems.length);
            const luckyItem = textItems[randomIndex];
            const luckyCode = luckyItem.textContent;
            
            const randomGradient = generateRandomGradient();
            luckyItem.style.setProperty('--random-fill-gradient', randomGradient);
            
            luckyItem.classList.add('lucky');
            luckyItem.classList.add('fill');
            setTimeout(() => {
                luckyItem.classList.remove('lucky');
                luckyItem.classList.remove('fill');
            }, 1000);
            
            copyTextToClipboard(luckyCode, luckyItem, true);
        });

        // 暗黑模式切换
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', savedTheme);
        themeBtn.textContent = config.themeBtnIcons[savedTheme];

        themeBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            body.setAttribute('data-theme', newTheme);
            themeBtn.textContent = config.themeBtnIcons[newTheme];
            localStorage.setItem('theme', newTheme);
        });

        // 回到顶部功能
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // 初始化时隐藏清除按钮
        clearSearchBtn.classList.remove('show');
    </script>
</body>
</html>
